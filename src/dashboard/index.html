<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🫕 Soupz Cloud Kitchen | Well-Lit Station</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --bg: #ffffff;
            --card-bg: #ffffff;
            --tile-color: #f0f0f0;
            --black: #000000;
            --accent: #ff3b30; /* Tomato Red */
            --mustard: #ffd60a;
            --cobalt: #007aff;
            --mint: #34c759;
            --text: #000000;
            --text-dim: #666666;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Space Grotesk', sans-serif;
            --brutal-shadow: 6px 6px 0px #000000;
            --brutal-shadow-sm: 3px 3px 0px #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font-sans);
            overflow-x: hidden;
            /* Well-Lit Kitchen Tiles */
            background-image: 
                linear-gradient(var(--tile-color) 2px, transparent 2px),
                linear-gradient(90deg, var(--tile-color) 2px, transparent 2px);
            background-size: 50px 50px;
            min-height: 100vh;
            padding: 40px;
        }

        header {
            max-width: 1400px;
            margin: 0 auto 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .logo-area { display: flex; align-items: center; gap: 20px; }
        .logo-icon { 
            font-size: 64px; 
            filter: drop-shadow(4px 4px 0px var(--black));
            transition: transform 0.3s;
        }
        .logo-icon:hover { transform: scale(1.1) rotate(5deg); }
        
        .logo-text h1 { 
            font-size: 48px; font-weight: 900; letter-spacing: -2px; 
            text-transform: uppercase; line-height: 0.9;
        }
        .logo-text p { 
            font-size: 12px; font-weight: 800; color: var(--text-dim); 
            text-transform: uppercase; letter-spacing: 4px; margin-top: 8px;
        }

        .live-status {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 24px; background: var(--mustard);
            border: 3px solid var(--black); border-radius: 16px;
            box-shadow: var(--brutal-shadow);
            font-weight: 900; text-transform: uppercase; font-size: 14px;
        }

        .pulse-dot {
            width: 12px; height: 12px; background: var(--mint);
            border: 2px solid var(--black); border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--black);
            border-radius: 24px;
            padding: 32px;
            box-shadow: var(--brutal-shadow);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0px var(--black);
        }

        .card-label {
            font-size: 12px; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; color: var(--text-dim); margin-bottom: 24px;
            display: block; border-bottom: 2px solid var(--black);
            padding-bottom: 8px; width: fit-content;
        }

        .stat-card { grid-column: span 3; }
        .stat-val { font-size: 48px; font-weight: 900; font-family: var(--font-mono); letter-spacing: -2px; color: var(--black); }
        .stat-desc { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

        .floor-card {
            grid-column: span 12;
            height: 280px;
            display: flex;
            align-items: center;
            background: #fafafa;
            background-image: radial-gradient(var(--tile-color) 20%, transparent 20%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
        }

        .kitchen-door {
            width: 120px; height: 180px;
            border: 4px solid var(--black);
            border-radius: 60px 60px 0 0;
            background: #fff;
            position: relative; margin-right: 60px;
            perspective: 1000px; flex-shrink: 0;
        }

        .door-leaf {
            width: 100%; height: 100%; background: var(--accent);
            border-radius: 56px 56px 0 0;
            border-right: 4px solid var(--black);
            transform-origin: left; transition: transform 0.8s;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 900; color: #fff; writing-mode: vertical-rl;
            text-transform: uppercase; letter-spacing: 4px;
        }
        .door-leaf.open { transform: rotateY(-110deg); }

        .chef-assembly { display: flex; gap: 40px; align-items: flex-end; flex: 1; overflow-x: auto; padding-bottom: 20px; }
        .chef-unit { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .chef-avatar { font-size: 64px; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1)); transition: 0.3s; }
        .chef-tag { 
            font-size: 11px; font-weight: 900; color: var(--black); 
            background: #fff; border: 2px solid var(--black);
            padding: 4px 12px; border-radius: 99px; box-shadow: var(--brutal-shadow-sm);
            text-transform: uppercase;
        }

        .receipts-card { grid-column: span 8; }
        .receipt-list { display: flex; flex-direction: column; gap: 12px; }
        .receipt-item {
            display: grid; grid-template-columns: 16px 1fr 100px; align-items: center; gap: 20px;
            padding: 16px 24px; background: #fff; border: 2px solid var(--black);
            border-radius: 16px; box-shadow: var(--brutal-shadow-sm);
        }
        .receipt-status { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--black); }
        .receipt-prompt { font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .receipt-time { font-size: 12px; font-weight: 900; color: var(--text-dim); text-align: right; }

        .top-chefs-card { grid-column: span 4; background: var(--mustard); }
        .leader-item { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; background: #fff; padding: 12px; border: 2px solid var(--black); border-radius: 12px; box-shadow: var(--brutal-shadow-sm); }
        .leader-info { flex: 1; }
        .leader-name { font-size: 14px; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; }
        .leader-bar-bg { width: 100%; height: 8px; background: #eee; border: 2px solid var(--black); border-radius: 4px; overflow: hidden; }
        .leader-bar-fill { height: 100%; background: var(--cobalt); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .offline-overlay {
            position: fixed; inset: 0; background: #fff; z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        .offline-overlay.active { display: flex; }
    </style>
</head>
<body>

    <div id="offline-screen" class="offline-overlay">
        <div style="font-size: 120px; margin-bottom: 20px;">🧊</div>
        <h2 style="font-size: 48px; font-weight: 900; text-transform: uppercase;">Stove is Cold</h2>
        <p style="font-size: 14px; font-weight: 700; color: #666; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;">Waiting for soupz-stall session...</p>
    </div>
<header>
    <div class="logo-area">
        <div class="logo-icon">🫕</div>
        <div class="logo-text">
            <h1>Soupz Kitchen</h1>
            <p id="uptime">Order Station · Offline</p>
        </div>
    </div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <button onclick="toggleTheme()" id="theme-btn" style="padding: 10px 20px; border: 3px solid black; border-radius: 12px; background: white; font-weight: 900; cursor: pointer; box-shadow: var(--brutal-shadow-sm); text-transform: uppercase; font-size: 12px;">Switch to Brutal</button>
        <div class="live-status">
            <div class="pulse-dot" id="status-dot"></div>
            <span id="status-text">Stove Ready</span>
        </div>
    </div>
</header>

<script>
    let currentTheme = 'kitchen';
    function toggleTheme() {
        currentTheme = currentTheme === 'kitchen' ? 'brutal' : 'kitchen';
        const btn = document.getElementById('theme-btn');
        if (currentTheme === 'brutal') {
            document.documentElement.style.setProperty('--bg', '#ffd60a');
            document.documentElement.style.setProperty('--tile-color', 'rgba(0,0,0,0.05)');
            btn.textContent = 'Switch to Kitchen';
        } else {
            document.documentElement.style.setProperty('--bg', '#ffffff');
            document.documentElement.style.setProperty('--tile-color', '#f0f0f0');
            btn.textContent = 'Switch to Brutal';
        }
    }

    <div class="container">
        <div class="card stat-card">
            <span class="card-label">Orders</span>
            <div class="stat-val" id="total-orders">0</div>
            <div class="stat-desc">Throughput</div>
        </div>
        <div class="card stat-card" style="background: var(--mint);">
            <span class="card-label">Success</span>
            <div class="stat-val" id="success-rate">0%</div>
            <div class="stat-desc" id="success-detail">0 served</div>
        </div>
        <div class="card stat-card" style="background: var(--cobalt); color: #fff;">
            <span class="card-label" style="color: #fff; border-color: #fff;">Speed</span>
            <div class="stat-val" id="avg-time" style="color: #fff;">0s</div>
            <div class="stat-desc" style="color: #fff;">Avg Latency</div>
        </div>
        <div class="card stat-card">
            <span class="card-label">Pantry Bill</span>
            <div class="stat-val" id="total-cost">$0.00</div>
            <div class="stat-desc" id="token-count">0 tokens</div>
        </div>

        <div class="card floor-card">
            <span class="card-label" style="position: absolute; top: 32px; left: 32px;">Live Kitchen Floor</span>
            <div class="kitchen-door"><div id="door-leaf" class="door-leaf">KITCHEN</div></div>
            <div id="chef-assembly" class="chef-assembly"></div>
        </div>

        <div class="card receipts-card">
            <span class="card-label">Order Receipts</span>
            <div id="receipt-list" class="receipt-list"></div>
        </div>

        <div class="card top-chefs-card">
            <span class="card-label">Elite Chefs</span>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        let lastTimestamp = 0;
        let knownChefIds = new Set();
        const offlineScreen = document.getElementById('offline-screen');

        async function update() {
            try {
                const res = await fetch('stall-state.json?t=' + Date.now());
                if (!res.ok) throw new Error('Offline');
                const data = await res.json();
                
                offlineScreen.classList.remove('active');
                if (data.timestamp === lastTimestamp) return;
                lastTimestamp = data.timestamp;

                document.getElementById('status-text').textContent = data.stall.status === 'cooking' ? 'CHEF IS COOKING' : 'STOVE READY';
                document.getElementById('status-dot').style.background = data.stall.status === 'cooking' ? 'var(--mustard)' : 'var(--mint)';

                document.getElementById('uptime').textContent = 'Uptime: ' + Math.floor(data.stall.uptime / 60000) + 'm · ' + data.stall.name;
                document.getElementById('total-orders').textContent = data.stats.totalOrders;
                
                const rate = data.stats.totalOrders > 0 ? Math.round((data.stats.completedOrders / data.stats.totalOrders) * 100) : 0;
                document.getElementById('success-rate').textContent = rate + '%';
                document.getElementById('success-detail').textContent = data.stats.completedOrders + ' served · ' + data.stats.failedOrders + ' burnt';
                document.getElementById('avg-time').textContent = data.stats.avgCookTime ? (data.stats.avgCookTime / 1000).toFixed(1) + 's' : '0s';
                document.getElementById('total-cost').textContent = '$' + (data.tokens?.cost || 0).toFixed(3);
                document.getElementById('token-count').textContent = (data.tokens?.total || 0).toLocaleString() + ' tokens';

                // Chef Floor
                const assembly = document.getElementById('chef-assembly');
                const activeIds = new Set(data.activeOrders.map(o => o.persona || o.agent));
                const onFloor = data.chefs.filter(c => c.calls > 0 || activeIds.has(c.id));
                
                let entered = false;
                onFloor.forEach(c => { if (!knownChefIds.has(c.id)) { knownChefIds.add(c.id); entered = true; } });
                if (entered) { 
                    document.getElementById('door-leaf').classList.add('open');
                    setTimeout(() => document.getElementById('door-leaf').classList.remove('open'), 1500);
                }

                assembly.innerHTML = onFloor.slice(0, 10).map(c => `
                    <div class="chef-unit">
                        <div class="chef-avatar" style="${activeIds.has(c.id) ? 'animation: bounce 0.5s infinite alternate' : ''}">${c.icon}</div>
                        <div class="chef-tag">${c.name.split(' ')[0]}</div>
                    </div>
                `).join('');

                // Receipts
                document.getElementById('receipt-list').innerHTML = (data.orders || []).slice(0, 6).map(o => `
                    <div class="receipt-item">
                        <div class="receipt-status" style="background: ${o.status === 'served' ? 'var(--mint)' : 'var(--accent)'}"></div>
                        <div class="receipt-prompt">${o.prompt}</div>
                        <div class="receipt-time">${o.duration ? (o.duration / 1000).toFixed(1) + 's' : '...'}</div>
                    </div>
                `).join('') || '<div style="text-align:center; padding:40px; font-weight:900; color:#ccc;">NO ORDERS YET</div>';

                // Leaderboard
                const top = Object.entries(data.grades).filter(([,v]) => v.usage > 0).sort((a,b) => b[1].grade - a[1].grade).slice(0, 4);
                document.getElementById('leaderboard').innerHTML = top.map(([id, v]) => `
                    <div class="leader-item">
                        <div class="leader-info">
                            <div class="leader-name">${v.icon} ${v.name}</div>
                            <div class="leader-bar-bg"><div class="leader-bar-fill" style="width: ${v.grade}%; background: ${v.grade > 80 ? 'var(--mint)' : 'var(--cobalt)'}"></div></div>
                        </div>
                        <div style="font-size:18px; font-weight:900;">${Math.round(v.grade)}</div>
                    </div>
                `).join('');

            } catch (e) { 
                offlineScreen.classList.add('active');
            }
        }

        setInterval(update, 2000);
        update();
        gsap.from("header", { y: -20, opacity: 0, duration: 1 });
        gsap.from(".card", { opacity: 0, scale: 0.9, stagger: 0.1, duration: 0.8, ease: "back.out(1.7)" });
    </script>
</body>
</html>
